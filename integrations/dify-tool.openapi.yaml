openapi: 3.1.0
info:
  title: Dify FastAPI RAG Tool Service
  version: 0.1.0
  description: |
    HTTP endpoints that can be imported into Dify as external tools.
    This spec intentionally exposes the synchronous retrieval and chat endpoints.
    The SSE streaming endpoint is kept outside this import flow for direct clients.
servers:
  - url: http://host.docker.internal:8000
    description: Dify container accessing the FastAPI service on the host machine
  - url: http://127.0.0.1:8000
    description: Local browser or script access during development
tags:
  - name: retrieval
    description: Retrieve indexed document chunks
  - name: chat
    description: Query the indexed knowledge base
paths:
  /api/v1/retrieval/search:
    post:
      tags: [retrieval]
      operationId: retrievalSearch
      summary: Search indexed document chunks
      description: Returns the most relevant indexed document chunks for a user query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalRequest"
            examples:
              basicSearch:
                summary: Search request
                value:
                  query: 如何部署这个服务？
                  top_k: 5
      responses:
        "200":
          description: Retrieval hits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalResponse"
  /api/v1/chat/query:
    post:
      tags: [chat]
      operationId: chatQuery
      summary: Query the indexed knowledge base
      description: Returns a final answer plus the retrieved source snippets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              defaultQuery:
                summary: Answer request
                value:
                  query: 这个项目的核心能力是什么？
                  top_k: 5
                  system_prompt: 请用中文给出简洁回答。
      responses:
        "200":
          description: Final answer with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
components:
  schemas:
    RetrievalRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: User search query
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Maximum number of hits to return
    RetrievalHit:
      type: object
      required: [chunk_id, document_id, filename, content, score, metadata]
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        filename:
          type: string
        content:
          type: string
        score:
          type: number
        metadata:
          type: object
          additionalProperties: true
    RetrievalResponse:
      type: object
      required: [query, hits]
      properties:
        query:
          type: string
        hits:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalHit"
    ChatRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: User question
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Number of retrieved chunks used as context
        system_prompt:
          type: string
          description: Optional system prompt injected into the chat request
    ChatSource:
      type: object
      required: [filename, content, score]
      properties:
        filename:
          type: string
        content:
          type: string
        score:
          type: number
    ChatResponse:
      type: object
      required: [answer, sources]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ChatSource"
